<p>basic-rxresource works!</p>

@if (myProductList.status() === 'loading') {
  <p>Loading...</p>
}

@if (myProductList.status() === 'error') {
  <p>Error: {{ myProductList.error() }}</p>
}

@if (myProductList.status() === 'resolved') {
  @for (item of myProductList.value(); track item.id) {
    <p>{{ item.title }}</p>
  }
}
